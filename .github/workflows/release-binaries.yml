name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run sanity checks
        run: bun run sanity

  build:
    name: Build ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            binary_name: vibe-cli-linux-x64
            archive_name: vibe-cli-linux-x64.tar.gz
          - os: macos-13
            label: darwin-x64
            binary_name: vibe-cli-darwin-x64
            archive_name: vibe-cli-darwin-x64.tar.gz
          - os: macos-14
            label: darwin-arm64
            binary_name: vibe-cli-darwin-arm64
            archive_name: vibe-cli-darwin-arm64.tar.gz
          - os: windows-latest
            label: windows-x64
            binary_name: vibe-cli-windows-x64.exe
            archive_name: vibe-cli-windows-x64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone binary
        run: bun run build:binary -- --outfile dist/${{ matrix.binary_name }}

      - name: Archive binary (Unix)
        if: runner.os != 'Windows'
        run: tar -C dist -czf dist/${{ matrix.archive_name }} ${{ matrix.binary_name }}

      - name: Archive binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
